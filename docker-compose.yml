version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
    restart: unless-stopped
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '5173:5173'
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped
